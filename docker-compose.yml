services:

  mongodb:
    image: mongo:7
    container_name: mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - ecommerce-network

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - ecommerce-network

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      JWT_SECRET: your_super_secret_key_change_this
      AUTH_SERVICE_URL: http://auth-service:3001
      SELLER_SERVICE_URL: http://seller-service:3002
      CATALOG_SERVICE_URL: http://catalog-service:3003
      INVENTORY_SERVICE_URL: http://inventory-service:3004
      ORDER_SERVICE_URL: http://order-service:3005
      PAYMENT_SERVICE_URL: http://payment-service:3006
      SHIPPING_SERVICE_URL: http://shipping-service:3007
      REVIEW_SERVICE_URL: http://review-service:3008
      MESSAGING_SERVICE_URL: http://messaging-service:3009
      NOTIFICATION_SERVICE_URL: http://notification-service:3010
      SEARCH_SERVICE_URL: http://search-service:3011
      ANALYTICS_SERVICE_URL: http://analytics-service:3012
    depends_on:
      - auth-service
      - seller-service
      - catalog-service
    networks:
      - ecommerce-network

  auth-service:
    build: ./auth-service
    container_name: auth-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      MONGO_URI: mongodb://mongodb:27017/auth-service
      JWT_SECRET: your_super_secret_key_change_this
      JWT_REFRESH_SECRET: your_refresh_secret_change_this
      JWT_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - ecommerce-network

  seller-service:
    build: ./seller-service
    container_name: seller-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongodb:27017/seller-service
      JWT_SECRET: your_super_secret_key_change_this
      CATALOG_SERVICE_URL: http://catalog-service:3003
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      - mongodb
      - rabbitmq
      - catalog-service
    networks:
      - ecommerce-network

  catalog-service:
    build: ./catalog-service
    container_name: catalog-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      MONGO_URI: mongodb://mongodb:27017/catalog-service
      JWT_SECRET: your_super_secret_key_change_this
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - ecommerce-network

  inventory-service:
    build: ./inventory-service
    container_name: inventory-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      MONGO_URI: mongodb://mongodb:27017/inventory-service
      JWT_SECRET: your_super_secret_key_change_this
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - ecommerce-network

  order-service:
    build: ./order-service
    container_name: order-service
    ports:
      - "3005:3005"
    environment:
      PORT: 3005
      MONGO_URI: mongodb://mongodb:27017/order-service
      JWT_SECRET: your_super_secret_key_change_this
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - ecommerce-network

  payment-service:
    build: ./payment-service
    container_name: payment-service
    ports:
      - "3006:3006"
    environment:
      PORT: 3006
      MONGO_URI: mongodb://mongodb:27017/payment-service
      JWT_SECRET: your_super_secret_key_change_this
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - ecommerce-network

  shipping-service:
    build: ./shipping-service
    container_name: shipping-service
    ports:
      - "3007:3007"
    environment:
      PORT: 3007
      MONGO_URI: mongodb://mongodb:27017/shipping-service
      JWT_SECRET: your_super_secret_key_change_this
      RABBITMQ_URL: amqp://rabbitmq
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - ecommerce-network

  review-service:
    build: ./review-service
    container_name: review-service
    ports:
      - "3008:3008"
    environment:
      PORT: 3008
      MONGO_URI: mongodb://mongodb:27017/review-service
      JWT_SECRET: your_super_secret_key_change_this
      RABBITMQ_URL: amqp://rabbitmq
      ORDER_SERVICE_URL: http://order-service:3005
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - ecommerce-network

  messaging-service:
    build: ./messaging-service
    container_name: messaging-service
    ports:
      - "3009:3009"
    environment:
      PORT: 3009
      MONGO_URI: mongodb://mongodb:27017/messaging-service
      JWT_SECRET: your_super_secret_key_change_this
    depends_on:
      - mongodb
    networks:
      - ecommerce-network

  notification-service:
    build: ./notification-service
    container_name: notification-service
    ports:
      - "3010:3010"
    environment:
      PORT: 3010
      RABBITMQ_URL: amqp://rabbitmq
      SMTP_HOST: smtp.ethereal.email
      SMTP_PORT: 587
      SMTP_USER: your_ethereal_user
      SMTP_PASS: your_ethereal_pass
      FROM_EMAIL: noreply@multivendor.com
    depends_on:
      - rabbitmq
    networks:
      - ecommerce-network

  search-service:
    build: ./search-service
    container_name: search-service
    ports:
      - "3011:3011"
    environment:
      PORT: 3011
      MONGO_URI: mongodb://mongodb:27017/catalog-service
    depends_on:
      - mongodb
    networks:
      - ecommerce-network

  analytics-service:
    build: ./analytics-service
    container_name: analytics-service
    ports:
      - "3012:3012"
    environment:
      PORT: 3012
      MONGO_URI: mongodb://mongodb:27017/order-service
      JWT_SECRET: your_super_secret_key_change_this
      AUTH_SERVICE_URL: http://auth-service:3001  # ← ADDED
    depends_on:
      - mongodb
      - auth-service  # ← ADDED
    networks:
      - ecommerce-network

  buyer-app:
    build: ./buyer-app
    container_name: buyer-app
    ports:
      - "3030:3030"
    environment:
      - AUTH_URL=http://auth-service:3001
      - SELLER_URL=http://seller-service:3002
      - CATALOG_URL=http://catalog-service:3003
      - ORDER_URL=http://order-service:3005
      - PAYMENT_URL=http://payment-service:3006
      - SHIPPING_URL=http://shipping-service:3007
      - REVIEW_URL=http://review-service:3008
      - MESSAGING_URL=http://messaging-service:3009
      - SEARCH_URL=http://search-service:3011
      - ANALYTICS_URL=http://analytics-service:3012
    depends_on:
      - api-gateway
    networks:
      - ecommerce-network

  seller-dashboard:
    build: ./seller-dashboard
    container_name: seller-dashboard
    ports:
      - "3031:3031"
    environment:
      - AUTH_URL=http://auth-service:3001
      - SELLER_URL=http://seller-service:3002
      - ORDER_URL=http://order-service:3005
      - SHIPPING_URL=http://shipping-service:3007
      - ANALYTICS_URL=http://analytics-service:3012
    depends_on:
      - api-gateway
    networks:
      - ecommerce-network

  admin-portal:
    build: ./admin-portal
    container_name: admin-portal
    ports:
      - "3032:3032"
    environment:
      - AUTH_URL=http://auth-service:3001
      - ORDER_URL=http://order-service:3005
      - REVIEW_URL=http://review-service:3008
      - ANALYTICS_URL=http://analytics-service:3012
      - SELLER_URL=http://seller-service:3002
    depends_on:
      - api-gateway
    networks:
      - ecommerce-network

networks:
  ecommerce-network:
    driver: bridge

volumes:
  mongo-data: